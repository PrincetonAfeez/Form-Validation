{% load form_extras %}
<div id="formset-row-{{ index }}" class="formset-row rounded-md border border-slate-200 p-4 dark:border-slate-800">
  <div class="mb-3 flex items-center justify-between gap-3">
    <h3 data-row-label class="text-sm font-semibold text-slate-800 dark:text-slate-200">Previous address {{ index|add:1 }}</h3>
    <button type="button"
            data-formset-remove
            class="rounded-md border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">
      Remove
    </button>
  </div>
  <div class="grid gap-4 md:grid-cols-2">
    {% for field in form.visible_fields %}
      {% render_bound_field form field %}
    {% endfor %}
  </div>
  {% for hidden in form.hidden_fields %}{{ hidden }}{% endfor %}
</div>
