<div id="file-scan-result" class="mt-3 space-y-3">
  <progress id="upload-progress"
            class="hidden h-2 w-full overflow-hidden rounded-full accent-teal-600"
            value="0"
            max="100"
            aria-label="Upload progress"></progress>
  <div class="rounded-md border {% if result.is_valid %}border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-900 dark:bg-emerald-950 dark:text-emerald-200{% else %}border-red-200 bg-red-50 text-red-800 dark:border-red-900 dark:bg-red-950 dark:text-red-200{% endif %} p-3 text-sm">
    <p>{{ result.message }}</p>
    {% if result.errors %}
      {% for key, value in result.errors.items %}
        <p class="mt-1">{{ key }}: {{ value }}</p>
      {% endfor %}
    {% endif %}
  </div>
</div>
