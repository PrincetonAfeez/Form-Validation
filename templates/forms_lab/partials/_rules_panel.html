<section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
  <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-700 dark:text-slate-300">Validation rules</h2>
  <div class="mt-4 space-y-3">
    {% for rule in rules %}
      <div class="border-l-2 border-teal-600 pl-3">
        <div class="text-sm font-semibold text-slate-900 dark:text-white">{{ rule.name }}</div>
        <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">{{ rule.description }}</p>
        <div class="mt-1 text-xs uppercase text-slate-500 dark:text-slate-400">{{ rule.layer }} layer</div>
      </div>
    {% endfor %}
  </div>
</section>
