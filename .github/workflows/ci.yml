name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: form_validation
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.ci
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/form_validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: npm ci
      - run: npm run build
      - run: test -f static/css/forms_lab.css
      - run: test -f static/js/vendor/htmx.min.js
      - run: test -f static/js/vendor/alpine.min.js
      - run: python manage.py migrate --noinput
      - run: ruff check apps config
      - run: pytest
      - run: python -m playwright install --with-deps chromium
      - run: pytest -m e2e --no-cov
